<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Precios - Belleza by Florencia Belén</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/precios.css"> 
</head>
<body>

  <nav>
    <div class="logo">
      <span class="logo-main">Belleza</span>
      <span class="logo-sub">BY Florencia Belén</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">INICIO</a></li>
      <li><a href="servicios.html">SERVICIOS</a></li>
      <li><a href="precios.html" class="active">PRECIOS</a></li>
      <li><a href="turnos.html">TURNOS Y CONTACTO</a></li>
    </ul>
  </nav>

  <section id="precios">
    <h2 class="section-title">Precios</h2>
    <div class="divider"><span class="heart">♥️</span></div>
    
    <div class="prices-inner">
      <div class="prices-list">
        <div class="price-row">
          <span>Uñas de gel</span>
          <span class="price-val">$30.000</span>
        </div>
        <div class="price-row">
          <span>Semipermanente en manos</span>
          <span class="price-val">$20.000</span>
        </div>
        <div class="price-row">
          <span>Semipermanente en pies</span>
          <span class="price-val">$15.000</span>
        </div>
        <div class="price-row">
          <span>Kapping gel</span>
          <span class="price-val">$25.000</span>
        </div>
        <div class="price-row">
          <span>Nail art</span>
          <span class="price-val">$1.000</span>
        </div>
      </div>
      
      <div class="prices-image">
        <div class="carrusel-fotos">
          <img src="img/foto 2.jpg" alt="Uñas Verdes y Blancas con Oro - Belleza by Florencia Belén">
          <img src="img/foto 3.webp" alt="Uñas Rojas con Detalle de Leopardo - Belleza by Florencia Belén">
          <img src="img/foto 4.webp" alt="Uñas Marrones y Beige Cat Eye - Belleza by Florencia Belén">
          <img src="img/foto 5.jpg" alt="Uñas Azul Marino con Oro - Belleza by Florencia Belén">
          <img src="img/foto 6.webp" alt="Uñas Rosadas con Flores - Belleza by Florencia Belén">
          <img src="img/foto 7.jpg" alt="Uñas Violetas con Flores - Belleza by Florencia Belén">
          <img src="img/foto 8.webp" alt="Uñas Marrones con Leopardo - Belleza by Florencia Belén">
          <img src="img/foto 9.webp" alt="Combinación Manos y Pies Azul Esmeralda - Belleza by Florencia Belén">
          <img src="img/foto 10.webp" alt="Uñas Fucsia con Ondas - Belleza by Florencia Belén">
          <img src="img/foto 11.jpg" alt="Uñas Esculpidas Animal Print Marrón - Belleza by Florencia Belén">
        </div>
        <button class="btn-carrusel btn-anterior" onclick="cambiarFoto(-1)">&#10094;</button>
        <button class="btn-carrusel btn-siguiente" onclick="cambiarFoto(1)">&#10095;</button>
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-hearts">💗 Gracias por elegirnos 💗</div>
    <div>© 2026. Belleza by Florencia Belén</div>
  </footer>

  <script src="js/script.js"></script>

</html>
