<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Turnos y Contacto - Belleza by Florencia Belén</title>

 <link rel="stylesheet" href="css/turnos.css">
</head>
<body>

  <nav>
    <div class="logo">
      <span class="logo-main">Belleza</span>
      <span class="logo-sub">BY Florencia Belén</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="servicios.html">Servicios</a></li>
      <li><a href="precios.html">Precios</a></li>
      <li><a href="turnos.html" class="active">Turnos y Contacto</a></li>
    </ul>
  </nav>

  <section id="turnos">
    <h2 class="section-title">Turnos y Contacto</h2>
    <div class="divider"><span class="heart">♥️</span></div>
    <div class="turnos-inner">
      
      <form id="form-turnos">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="nombre" placeholder="Escribí tu nombre" required />
        </div>
        <div class="form-group">
          <label>Servicio</label>
          <select id="servicio" required>
            <option value="" disabled selected>Seleccioná un servicio</option>
            <option value="Uñas de gel">Uñas de gel</option>
            <option value="Semipermanente en manos">Semipermanente en manos</option>
            <option value="Semipermanente en pies">Semipermanente en pies</option>
            <option value="Kapping gel">Kapping gel</option>
            <option value="Nail art">Nail art</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="fecha" required />
        </div>
        <div class="form-group">
          <label>Hora</label>
          <input type="time" id="hora" required />
        </div>
        <button type="submit" class="btn-primary">Reservar turno</button>
      </form>

      <div>
        <div class="caja-imagen-agenda">
          <img src="img/agenda.png" alt="Agenda de turnos de Belleza by Florencia Belén">
        </div>
      </div>
    </div>

    <div class="contact-section">
      <h2 class="section-title" style="font-size:1.5rem;">Contacto</h2>
      <div class="divider"><span class="heart">♥️</span></div>
      <div class="contact-items">
        <div class="contact-item">
          <strong>WhatsApp</strong>
          +54 9 11 2165-2367
        </div>
        <div class="contact-item">
          <strong>Instagram</strong>
          @Belleza.byflorenciabelen
        </div>
        <div class="contact-item">
          <strong>Ubicación</strong>
          Berón de Astrada 1410<br>Ramos Mejia
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-hearts">💗 Gracias por elegirnos 💗</div>
    <div>© 2026. Belleza by Florencia Belén</div>
  </footer>

  <script src="js/script.js"></script>

</body>
</html>
